name: Desktop beta release

# Fires on every push to main. Builds a fresh desktop bundle, signs it,
# and replaces the rolling `beta` GitHub Release so the updater endpoint
# always points at the latest beta.
#
# Concurrency-cancels in-flight runs: if you merge two PRs back-to-back,
# the first run is cancelled and the second one wins, so we don't waste
# minutes building intermediate states.
on:
  push:
    branches:
      - main

concurrency:
  group: desktop-beta
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust_triple: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for the rev-count version bump

      # ── Toolchains ──────────────────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_triple }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ── Caches ──────────────────────────────────────────────────────────
      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.platform }}-cargo-beta-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.platform }}-cargo-beta-
            ${{ matrix.platform }}-cargo-

      # ── Compute beta version ────────────────────────────────────────────
      - name: Compute beta version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          BASE=$(jq -r '.version' src-tauri/tauri.conf.json)
          COUNT=$(git rev-list --count HEAD)
          SHA=$(git rev-parse --short HEAD)
          BETA="${BASE}-beta.${COUNT}+${SHA}"
          echo "version=${BETA}" >> "$GITHUB_OUTPUT"
          echo "tag=beta"        >> "$GITHUB_OUTPUT"
          echo "Computed beta version: ${BETA}"

      - name: Patch beta version into config files
        shell: bash
        run: |
          set -euo pipefail
          V='${{ steps.version.outputs.version }}'
          # tauri.conf.json
          tmp=$(mktemp)
          jq --arg v "$V" '.version = $v' src-tauri/tauri.conf.json > "$tmp"
          mv "$tmp" src-tauri/tauri.conf.json
          # Cargo.toml — keep the base version (no SemVer pre-release) so
          # Cargo.lock doesn't need regenerating. Only the bundle's
          # displayed version (read from tauri.conf.json) reflects beta.

      # ── Dependencies ────────────────────────────────────────────────────
      - name: Install backend Python deps + PyInstaller
        run: python -m pip install --upgrade pip && python -m pip install pyinstaller -r backend/requirements.txt

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Tauri CLI (prebuilt via npm)
        run: npm install -g @tauri-apps/cli@^2

      # ── Build ───────────────────────────────────────────────────────────
      - name: Build backend sidecar
        run: python scripts/build-backend.py

      - name: Build Tauri desktop app (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TRACE_UPDATER_TOKEN: ${{ secrets.TRACE_UPDATER_TOKEN }}
        run: tauri build

      # ── Collect bundles + sigs ──────────────────────────────────────────
      - name: Collect bundles
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cp src-tauri/target/release/bundle/nsis/*.exe     artifacts/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/nsis/*.exe.sig artifacts/ 2>/dev/null || true
          ls -lh artifacts/

      # ── Generate latest-beta.json manifest ──────────────────────────────
      - name: Generate latest-beta.json
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          NSIS_EXE=$(ls artifacts/*setup.exe 2>/dev/null | head -1)
          NSIS_SIG=$(ls artifacts/*setup.exe.sig 2>/dev/null | head -1)
          if [[ -z "$NSIS_EXE" || -z "$NSIS_SIG" ]]; then
            echo "Missing NSIS bundle or its .sig — can't build manifest" >&2
            exit 1
          fi
          SIG=$(cat "$NSIS_SIG")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/beta/$(basename "$NSIS_EXE")"
          cat > artifacts/latest-beta.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Beta build from main @ $(git rev-parse --short HEAD). See commit history for changes.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIG}",
                "url": "${DOWNLOAD_URL}"
              }
            }
          }
          EOF

      # ── Replace the sliding `beta` release ──────────────────────────────
      # We delete and recreate the release on every run so the download URL
      # at https://github.com/.../releases/download/beta/<asset> always
      # points at the most recent beta. Tag `beta` is force-moved.
      - name: Replace beta release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          # Delete the existing beta release (if any) and its tag. Both
          # commands are tolerated to fail (the release/tag might not exist
          # yet on the first run).
          gh release delete beta --yes --cleanup-tag --repo "${{ github.repository }}" 2>/dev/null || true
          # Create the new release pointed at this commit.
          gh release create beta \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --prerelease \
            --title "Beta — ${{ steps.version.outputs.version }}" \
            --notes "Auto-generated beta build from main @ $(git rev-parse --short HEAD). Tag intentionally moves on every push — use the stable tags (vX.Y.Z) for reproducible installs." \
            artifacts/*
