name: Desktop release

# Triggers on tag pushes matching v*.*.*  (e.g. v1.0.0, v1.2.3-beta.1).
# Also exposes a manual trigger so you can dry-run the pipeline without
# cutting a tag (the resulting Release will be marked draft+prerelease).
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v1.0.1-dryrun)"
        required: true
        default: "v0.0.0-dryrun"

permissions:
  contents: write   # required to create a Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust_triple: x86_64-pc-windows-msvc
          # Uncomment to enable additional platforms - leave commented for
          # now since we've only smoke-tested Windows. To enable Mac/Linux:
          #   1. Verify PyInstaller bundles all hidden imports on that OS
          #   2. Add the OS to the bundle.targets list in tauri.conf.json
          #   3. Wire up signing/notarization secrets if going public
          # - platform: macos-latest
          #   rust_triple: aarch64-apple-darwin
          # - platform: ubuntu-22.04
          #   rust_triple: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchains ──────────────────────────────────────────────────────
      # rust-toolchain.toml in src-tauri/ pins the channel to 1.94, so we
      # don't pass `toolchain:` here - rustup will read the file and DTRT.
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_triple }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json

      # ── Linux extras ────────────────────────────────────────────────────
      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Caches ──────────────────────────────────────────────────────────
      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.platform }}-cargo-

      # ── Dependencies ────────────────────────────────────────────────────
      - name: Install backend Python deps + PyInstaller
        run: python -m pip install --upgrade pip && python -m pip install pyinstaller -r backend/requirements.txt

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Tauri CLI (prebuilt via npm)
        run: npm install -g @tauri-apps/cli@^2

      # ── Build ───────────────────────────────────────────────────────────
      - name: Build backend sidecar (frontend + PyInstaller)
        run: python scripts/build-backend.py

      - name: Build Tauri desktop app
        env:
          # Tauri updater signing - generates .sig sidecar files next to
          # each bundle. Without these, end-user updates fail signature
          # verification and refuse to install.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # GitHub PAT for fetching from the private releases endpoint.
          # build.rs picks this up and bakes it into the binary as a
          # compile-time const. End users never touch this directly.
          TRACE_UPDATER_TOKEN: ${{ secrets.TRACE_UPDATER_TOKEN }}
          # Windows signing - picked up by tauri.conf.json's signCommand if
          # configured. Empty values are tolerated (build proceeds unsigned).
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          # macOS signing + notarization - Tauri picks these up natively.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: tauri build

      # ── Resolve tag name FIRST (needed by manifest generation) ───────────
      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            if [[ "${GITHUB_REF#refs/tags/}" == *-* ]]; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      # ── Collect bundles ──────────────────────────────────────────────────
      - name: Collect bundles
        id: collect
        shell: bash
        run: |
          mkdir -p artifacts
          # Windows
          if [[ "${{ matrix.platform }}" == windows-* ]]; then
            cp src-tauri/target/release/bundle/nsis/*.exe artifacts/ 2>/dev/null || true
            cp src-tauri/target/release/bundle/nsis/*.exe.sig artifacts/ 2>/dev/null || true
            cp src-tauri/target/release/bundle/msi/*.msi  artifacts/ 2>/dev/null || true
            cp src-tauri/target/release/bundle/msi/*.msi.sig artifacts/ 2>/dev/null || true
          fi
          # macOS
          if [[ "${{ matrix.platform }}" == macos-* ]]; then
            cp -r src-tauri/target/release/bundle/dmg/*.dmg         artifacts/ 2>/dev/null || true
            cp -r src-tauri/target/release/bundle/dmg/*.dmg.sig     artifacts/ 2>/dev/null || true
            cp -r src-tauri/target/release/bundle/macos/*.app       artifacts/ 2>/dev/null || true
            cp -r src-tauri/target/release/bundle/macos/*.app.tar.gz artifacts/ 2>/dev/null || true
            cp -r src-tauri/target/release/bundle/macos/*.app.tar.gz.sig artifacts/ 2>/dev/null || true
          fi
          # Linux
          if [[ "${{ matrix.platform }}" == ubuntu-* ]]; then
            cp src-tauri/target/release/bundle/appimage/*.AppImage     artifacts/ 2>/dev/null || true
            cp src-tauri/target/release/bundle/appimage/*.AppImage.sig artifacts/ 2>/dev/null || true
            cp src-tauri/target/release/bundle/deb/*.deb               artifacts/ 2>/dev/null || true
            cp src-tauri/target/release/bundle/rpm/*.rpm               artifacts/ 2>/dev/null || true
          fi
          ls -lh artifacts/

      # ── Generate latest.json manifest for the updater ───────────────────
      - name: Generate latest.json
        if: matrix.platform == 'windows-latest'   # only one runner emits the manifest
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.name }}
          # Drop the leading "v" - Tauri version strings don't include it.
          VERSION: ${{ steps.tag.outputs.name }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"
          NSIS_EXE=$(ls artifacts/*setup.exe 2>/dev/null | head -1)
          NSIS_SIG=$(ls artifacts/*setup.exe.sig 2>/dev/null | head -1)
          if [[ -z "$NSIS_EXE" || -z "$NSIS_SIG" ]]; then
            echo "Missing NSIS bundle or its .sig - can't build manifest" >&2
            exit 1
          fi
          SIG=$(cat "$NSIS_SIG")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/$(basename "$NSIS_EXE")"
          cat > artifacts/latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See https://github.com/${{ github.repository }}/releases/tag/${TAG} for changelog.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIG}",
                "url": "${DOWNLOAD_URL}"
              }
            }
          }
          EOF
          echo "=== artifacts/latest.json ==="
          cat artifacts/latest.json

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Trace. ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
          files: artifacts/*
