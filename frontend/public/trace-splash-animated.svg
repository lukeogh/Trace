<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" fill="none" role="img" aria-label="Trace">
  <!-- Background -->
  <rect width="600" height="400" fill="#0F0E0C"/>

  <!-- ─── The fork mark, centered at top ─────────────────────────────────── -->
  <g transform="translate(252, 110) scale(1.0)">
    <!-- Stem: draws 0-0.5s -->
    <path d="M 22 50 L 50 50"
          stroke="#F7F4ED" stroke-width="11"
          stroke-linecap="round" stroke-linejoin="round"
          stroke-dasharray="30">
      <animate attributeName="stroke-dashoffset"
               values="30;0;0"
               keyTimes="0;0.17;1"
               keySplines="0.65 0 0.35 1; 0 0 1 1"
               calcMode="spline"
               dur="3s"
               fill="freeze"/>
    </path>
    <!-- Top branch: draws 0.5-1.0s -->
    <path d="M 50 50 L 78 26"
          stroke="#F7F4ED" stroke-width="11"
          stroke-linecap="round" stroke-linejoin="round"
          stroke-dasharray="38">
      <animate attributeName="stroke-dashoffset"
               values="38;38;0;0"
               keyTimes="0;0.17;0.33;1"
               keySplines="0 0 1 1; 0.65 0 0.35 1; 0 0 1 1"
               calcMode="spline"
               dur="3s"
               fill="freeze"/>
    </path>
    <!-- Bottom branch: draws 0.8-1.4s -->
    <path d="M 50 50 L 78 74"
          stroke="#F7F4ED" stroke-width="11"
          stroke-linecap="round" stroke-linejoin="round"
          stroke-dasharray="38">
      <animate attributeName="stroke-dashoffset"
               values="38;38;0;0"
               keyTimes="0;0.27;0.47;1"
               keySplines="0 0 1 1; 0.65 0 0.35 1; 0 0 1 1"
               calcMode="spline"
               dur="3s"
               fill="freeze"/>
    </path>
  </g>

  <!-- ─── Wordmark "Trace" — fades up 1.4-1.8s ─────────────────────────── -->
  <g opacity="0">
    <text x="300" y="290" text-anchor="middle"
          font-family="Geist, system-ui, -apple-system, sans-serif"
          font-weight="500" font-size="56" letter-spacing="-2.5" fill="#F7F4ED">Trace</text>
    <animate attributeName="opacity"
             values="0;0;1;1"
             keyTimes="0;0.47;0.63;1"
             dur="3s"
             fill="freeze"/>
    <animateTransform attributeName="transform" type="translate"
                      values="0,6;0,6;0,0;0,0"
                      keyTimes="0;0.47;0.63;1"
                      keySplines="0 0 1 1; 0.2 0.8 0.2 1; 0 0 1 1"
                      calcMode="spline"
                      dur="3s"
                      fill="freeze"/>
  </g>

  <!-- ─── Mint dot — pops in 1.9-2.4s ─────────────────────────────────── -->
  <circle cx="368" cy="282" r="6" fill="#10B981"
          opacity="0" transform="scale(0)" transform-origin="368 282">
    <animate attributeName="opacity"
             values="0;0;1;1"
             keyTimes="0;0.63;0.73;1"
             dur="3s"
             fill="freeze"/>
    <animateTransform attributeName="transform" type="scale"
                      additive="sum"
                      values="0;0;1.3;1;1"
                      keyTimes="0;0.63;0.73;0.80;1"
                      keySplines="0 0 1 1; 0.34 1.56 0.64 1; 0.2 0.8 0.2 1; 0 0 1 1"
                      calcMode="spline"
                      dur="3s"
                      fill="freeze"/>
  </circle>

  <!-- ─── Slogan — fades up 2.5-3.0s ──────────────────────────────────── -->
  <g opacity="0">
    <text x="300" y="340" text-anchor="middle"
          font-family="Geist Mono, ui-monospace, monospace"
          font-weight="500" font-size="13" letter-spacing="3.6" fill="#F7F4ED"
          style="text-transform: uppercase;">STAY ACROSS EVERYTHING</text>
    <animate attributeName="opacity"
             values="0;0;0.55;0.55"
             keyTimes="0;0.80;0.93;1"
             dur="3s"
             fill="freeze"/>
    <animateTransform attributeName="transform" type="translate"
                      values="0,4;0,4;0,0;0,0"
                      keyTimes="0;0.80;0.93;1"
                      keySplines="0 0 1 1; 0.2 0.8 0.2 1; 0 0 1 1"
                      calcMode="spline"
                      dur="3s"
                      fill="freeze"/>
  </g>
</svg>
