<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none" role="img" aria-label="Trace">
  <!-- Mark, centred -->
  <path d="M 70 70 L 92 70 L 114 48 M 92 70 L 114 92"
        stroke="#14130F" stroke-width="9" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wordmark "Trace", centred -->
  <text x="100" y="170" text-anchor="middle"
        font-family="Geist, system-ui, -apple-system, sans-serif"
        font-weight="500" font-size="40" letter-spacing="-1.8" fill="#14130F">Trace</text>
  <!-- Mint dot, positioned after the wordmark.
       "Trace" at this size renders roughly 55-60px wide, centred at x=100.
       Right edge of "e" is approximately x=129, dot baseline at y=163 -->
  <circle cx="142" cy="164" r="4.5" fill="#10B981"/>
</svg>
